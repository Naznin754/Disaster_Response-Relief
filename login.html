<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReliefHub - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation */
    .navbar {
      background: rgba(255, 255, 255, 0.98) !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      padding: 0.8rem 0;
    }

    .navbar-brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #2c3e50 !important;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar-brand i {
      color: #e74c3c;
      font-size: 1.8rem;
    }

    .nav-link {
      color: #555 !important;
      font-weight: 500;
      transition: all 0.3s ease;
      padding: 0.5rem 1rem !important;
    }

    .nav-link:hover {
      color: #e74c3c !important;
    }

    /* Main Container */
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Login Card */
    .login-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      max-width: 500px;
      width: 100%;
      background: white;
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .login-header i {
      font-size: 2.5rem;
      color: #e74c3c;
      margin-bottom: 0.5rem;
    }

    .login-header h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* Tabs */
    .nav-tabs {
      border-bottom: 2px solid #ecf0f1;
    }

    .nav-tabs .nav-link {
      color: #7f8c8d !important;
      border: none;
      padding: 1rem !important;
      font-weight: 600;
      transition: all 0.3s;
    }

    .nav-tabs .nav-link:hover {
      color: #2c3e50 !important;
      border-bottom: 3px solid #3498db;
    }

    .nav-tabs .nav-link.active {
      color: white !important;
      background: #e74c3c;
      border: none;
      border-bottom: 3px solid #c0392b;
    }

    .tab-content {
      padding: 2rem;
    }

    /* Form Elements */
    .form-label {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 0.5rem;
    }

    .form-control, .form-select {
      border: 2px solid #ecf0f1;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .form-control:focus, .form-select:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.15);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      border: none;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      border-radius: 10px;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(231, 76, 60, 0.3);
      background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);
    }

    .btn-outline-secondary {
      border: 2px solid #95a5a6;
      color: #2c3e50;
      font-weight: 600;
      border-radius: 10px;
      transition: all 0.3s;
    }

    .btn-outline-secondary:hover {
      background: #95a5a6;
      color: white;
      border-color: #95a5a6;
    }

    .login-footer {
      text-align: center;
      color: #7f8c8d;
      font-size: 0.9rem;
    }

    .login-footer a {
      color: #e74c3c;
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* Success Screen */
    .success-screen {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-lg">
      <a class="navbar-brand" href="login.html">
        <i class="bi bi-shield-fill"></i> ReliefHub
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#aboutModal">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#howModal">How It Works</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#helpModal">Help</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#contactModal">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="login-container">
    
    <!-- Main Login/Register Card -->
    <div class="login-card" id="authCard">
      <div class="login-header">
        <i class="bi bi-shield-fill"></i>
        <h2>ReliefHub</h2>
        <p>Disaster Response & Relief Distribution System</p>
      </div>

      <ul class="nav nav-tabs" id="authTabs">
        <li class="nav-item flex-fill"><button class="nav-link active w-100" id="login-tab" data-bs-toggle="tab" data-bs-target="#login">Login</button></li>
        <li class="nav-item flex-fill"><button class="nav-link w-100" id="register-tab" data-bs-toggle="tab" data-bs-target="#register">Register</button></li>
      </ul>

      <div class="tab-content">
        <!-- Login Tab -->
        <div class="tab-pane fade show active" id="login">
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Username / Email</label>
              <input type="text" class="form-control" placeholder="Enter username or email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="Enter password" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Select Role</label>
              <select class="form-select" required>
                <option value="">-- Choose Role --</option>
                <option value="admin">Admin</option>
                <option value="field">Field Officer</option>
                <option value="donor">Donor</option>
                <option value="ngo">NGO Representative</option>
                <option value="victim">Victim</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
          </form>
        </div>

        <!-- Register Tab -->
        <div class="tab-pane fade" id="register">
          <form id="registerForm">
            <div class="row g-3">
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Full Name" required></div>
              <div class="col-md-6"><input type="tel" class="form-control" placeholder="Phone Number" required></div>
              <div class="col-12"><input type="email" class="form-control" placeholder="Email Address" required></div>
              <div class="col-md-6"><input type="password" class="form-control" placeholder="Password" required></div>
              <div class="col-md-6"><input type="password" class="form-control" placeholder="Confirm Password" required></div>
              <div class="col-12">
                <select class="form-select" required>
                  <option value="">-- Register As --</option>
                  <option value="victim">Victim</option>
                  <option value="donor">Donor</option>
                  <option value="volunteer">Volunteer</option>
                  <option value="ngo">NGO Representative</option>
                </select>
              </div>
              <div class="col-12 mt-3">
                <button type="submit" class="btn btn-success w-100 btn-lg">Create Account</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ==================== SUCCESS SCREEN ==================== -->
    <div class="login-card bg-white p-5 text-center success-screen" id="successScreen">
      <i class="bi bi-check-circle-fill" style="font-size: 5rem; color: #2ecc71;"></i>
      <h2 class="text-success mt-3">Account Created Successfully!</h2>
      <p class="lead text-muted">Your account has been registered.</p>
      
      <div class="my-4 p-3 border rounded text-start">
        <p><strong>Name:</strong> <span id="successName">John Doe</span></p>
        <p><strong>Role:</strong> <span id="successRole">Victim</span></p>
        <p><strong>Account ID:</strong> <span class="text-success">VH-23047891</span></p>
      </div>

      <a href="login.html" class="btn btn-primary btn-lg px-5">Go to Login</a>
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Login Form
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    alert("✅ Login Successful!");
    window.location.href = "dashboard.html";
  });

  // Register Form → Show Success Screen
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Get user input for success message
    const name = this.querySelector('input[placeholder="Full Name"]').value || "User";
    const roleSelect = this.querySelector('select');
    const role = roleSelect.options[roleSelect.selectedIndex].text || "User";

    // Fill success screen
    document.getElementById('successName').textContent = name;
    document.getElementById('successRole').textContent = role;

    // Hide auth card and show success screen
    document.getElementById('authCard').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
  });
</script>

</body>
</html>
